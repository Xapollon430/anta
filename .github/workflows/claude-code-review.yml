name: Claude Code Review

on:
  pull_request:
    # Review once the PR is ready for review (not on every push). `opened`
    # covers PRs created directly as non-draft; `ready_for_review` covers the
    # draft → ready transition. The `draft == false` job guard skips draft
    # PRs, and the absence of `synchronize` means pushes don't re-trigger.
    types: [opened, ready_for_review]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    # Skip drafts — only review ready PRs.
    if: github.event.pull_request.draft == false

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        # Pinned to last good release; @v1 floats to v1.0.151 which crashes at
        # SDK auth init (token-exchange regression). See claude.yml for detail.
        uses: anthropics/claude-code-action@v1.0.150
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # Layer Anta's project-specific review rubric on top of the default
          # code-review behavior (CLAUDE.md is already auto-loaded as context).
          claude_args: '--append-system-prompt-file ./.github/anta-review.md'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

